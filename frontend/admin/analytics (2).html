<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="admin.css">

<style>

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:
0 2px 8px rgba(0,0,0,.1);
}

.value{
font-size:30px;
font-weight:bold;
color:#2e7d32;
}

</style>

</head>

<body>

<div class="content">

<h1>Analytics Dashboard</h1>

<div class="cards">

<div class="card">
Total Users
<div class="value" id="users">
0
</div>
</div>

<div class="card">
Price Records
<div class="value" id="crops">
0
</div>
</div>

<div class="card">
Markets
<div class="value" id="markets">
0
</div>
</div>

<div class="card">
Average Price
<div class="value" id="avg">
₹0
</div>
</div>

</div>

<br>

<div class="card">

<h3>
Highest Price Crop
</h3>

<p id="high"></p>

</div>

<br>

<div class="card">

<h3>
Lowest Price Crop
</h3>

<p id="low"></p>

</div>

</div>

<script src="analytics.js"></script>

</body>
