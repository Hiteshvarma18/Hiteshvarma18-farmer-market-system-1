<!DOCTYPE html>
<html>
<head>
<link
rel="stylesheet"
href="dashboard.css"
>
</head>

<body>

<div class="navbar">
Price Trends
</div>

<div class="container">

<canvas
id="chart"
width="600"
height="300"
></canvas>

</div>

<script src="
https://cdn.jsdelivr.net/npm/chart.js
"></script>

<script>

const ctx =
document.getElementById(
'chart'
);

new Chart(ctx,{

type:'line',

data:{

labels:[
'Jan',
'Feb',
'Mar',
'Apr',
'May'
],

datasets:[{

label:
'Tomato Price',

data:[
20,
22,
25,
24,
28
]

}]

}

});

</script>

</body>
</html>
