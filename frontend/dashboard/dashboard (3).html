<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Market Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<style>
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar a {
    color:white;
    text-decoration:none;
    margin:0 5px;
    font-weight:bold;
}

.top-actions {
    margin: 15px 0;
    display: flex;
    gap: 10px;
}

button {
    padding: 10px 15px;
    border: none;
    background: #2e7d32;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}
</style>

</head>

<body>

<div class="navbar">
    🌾 Farmer Market Dashboard

    <span>
        <a href="analytics.html">Analytics</a> |
        <a href="predict.html">Prediction</a> |
        <a href="../login.html">Logout</a>
    </span>
</div>

<div class="container">

    <!-- Filters -->
    <div class="filters">

        <select id="market">
            <option value="">Select Market</option>
        </select>

        <input id="search" placeholder="Search Crop">

        <button onclick="loadPrices()">Search</button>

    </div>

    <!-- Results -->
    <div id="results"></div>

    <!-- Admin Actions -->
    <div class="top-actions">

        <button onclick="refreshPrices()">
            🔄 Refresh Prices
        </button>

        <button onclick="retrainAI()">
            🤖 Retrain AI
        </button>

    </div>

</div>

<script src="dashboard.js"></script>

<script>

async function refreshPrices() {
    try {
        const res = await fetch(
            "http://127.0.0.1:8000/api/admin/refresh-prices",
            { method: "POST" }
        );

        const data = await res.json().catch(() => ({}));

        alert("Price refresh started ✔");
        console.log(data);

    } catch (err) {
        alert("Error refreshing prices");
        console.error(err);
    }
}

async function retrainAI() {
    try {
        const res = await fetch(
            "http://127.0.0.1:8000/api/admin/retrain-ai",
            { method: "POST" }
        );

        const data = await res.json().catch(() => ({}));

        alert("AI retraining started ✔");
        console.log(data);

    } catch (err) {
        alert("Error starting AI training");
        console.error(err);
    }
}

</script>

</body>

</html>
